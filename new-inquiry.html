<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Inquiry | CRM Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-main">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i data-lucide="layers" class="brand-icon"></i>
                <h2>CRM Pro</h2>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i data-lucide="menu"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li class="nav-item" data-page="dashboard-view" onclick="window.location.href='index.html'">
                        <i data-lucide="layout-dashboard" class="nav-icon"></i> <span>Dashboard</span>
                    </li>
                    <li class="nav-item active" data-page="leads-view" onclick="window.location.href='index.html#leads-view'">
                        <i data-lucide="users" class="nav-icon"></i> <span>Leads</span>
                    </li>
                    <li class="nav-item" data-page="users-view" id="nav-team" onclick="window.location.href='index.html#users-view'">
                        <i data-lucide="user-plus" class="nav-icon"></i> <span>Team & Assignments</span>
                    </li>
                    <li class="nav-item" data-page="reports-view" onclick="window.location.href='index.html#reports-view'">
                        <i data-lucide="bar-chart-3" class="nav-icon"></i> <span>Insights</span>
                    </li>
                    <li class="nav-item" data-page="lead-requests-view" id="nav-requests" onclick="window.location.href='index.html#lead-requests-view'">
                        <i data-lucide="clipboard-list" class="nav-icon"></i> <span>Lead Requests</span>
                    </li>
                    <li class="nav-item" data-page="settings-view" id="nav-settings" onclick="window.location.href='index.html#settings-view'">
                        <i data-lucide="settings" class="nav-icon"></i> <span>Field Configuration</span>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-left">
                    <h1 id="pageTitle">New Inquiry</h1>
                </div>
                <div class="header-right">
                    <button id="logoutBtn" class="btn btn-secondary btn-sm" style="margin-right: 1rem;">Logout</button>
                    <div class="user-profile">
                        <span class="user-name" id="currentUserDisplayName">User</span>
                        <div class="user-avatar" id="currentUserAvatar">U</div>
                    </div>
                </div>
            </header>

            <div class="content-area" style="padding: 2rem;">
                <div class="card" style="max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease-out;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                        <div>
                            <h2 id="formTitle" style="margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.75rem;">
                                <i data-lucide="plus-circle" class="text-primary"></i> New Inquiry
                            </h2>
                            <p style="color: var(--text-muted); font-size: 0.9rem;">Fill in the details to create a new inquiry record.</p>
                        </div>
                        <a href="index.html" class="btn btn-secondary">
                            <i data-lucide="arrow-left"></i> Back to Dashboard
                        </a>
                    </div>

                    <form id="leadForm">
                        <input type="hidden" id="editingId">
                        <div class="form-grid">
                            <!-- Section: Lead Info -->
                            <div class="form-section">
                                <h3><i data-lucide="user"></i> Lead Information</h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    <div class="form-group">
                                        <label>Lead Source</label>
                                        <div id="leadSourceRadios" class="radio-group-container">
                                            <!-- Dynamic radio buttons -->
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="fullName">Full Name</label>
                                        <input type="text" id="fullName" required placeholder="Enter full name">
                                    </div>
                                    <div class="form-group">
                                        <label for="phone">Phone Number</label>
                                        <input type="tel" id="phone" required placeholder="10-digit number" maxlength="10" pattern="\d{10}">
                                    </div>
                                </div>
                            </div>

                            <!-- Section: Event Details -->
                            <div class="form-section">
                                <h3><i data-lucide="map-pin"></i> Event Details</h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    <div class="form-group">
                                        <label>Events Interested In</label>
                                        <div class="multi-select-container" id="eventsInterestedContainer">
                                            <div class="multi-select-search">
                                                <i data-lucide="search"
                                                    style="width: 16px; color: var(--text-muted); margin-left: 0.5rem;"></i>
                                                <input type="text" placeholder="Search events..." class="inner-search-input">
                                            </div>
                                            <div class="checkbox-list">
                                                <!-- Dynamic -->
                                            </div>
                                        </div>
                                    </div>
                                    <div class="form-group" id="primaryEventGroup" style="display: none;">
                                        <label for="primaryEvent">Primary Event</label>
                                        <select id="primaryEvent" required>
                                            <option value="" disabled selected>Select Primary Event</option>
                                            <!-- Dynamic -->
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="travelDate">Tentative Travel Date</label>
                                        <input type="date" id="travelDate">
                                    </div>
                                </div>
                            </div>

                            <!-- Section: Engagement -->
                            <div class="form-section">
                                <h3><i data-lucide="message-square"></i> Engagement</h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    <div class="form-group">
                                        <label for="reasonsSelection">Reason to Call</label>
                                        <select id="reasonsSelection">
                                            <option value="" disabled selected>Select Reason</option>
                                            <!-- Dynamic -->
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="actionsRequired">Action Required</label>
                                        <select id="actionsRequired">
                                            <option value="" disabled selected>Select Action</option>
                                            <!-- Dynamic -->
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="participantStatus">Current Participant Status</label>
                                        <select id="participantStatus">
                                            <option value="" disabled selected>Select Status</option>
                                            <!-- Dynamic -->
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Section: Admin & Remarks -->
                            <div class="form-section">
                                <h3><i data-lucide="clipboard"></i> Admin & Remarks</h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    <div class="form-group">
                                        <label for="assignTo">Assigned To</label>
                                        <input type="text" id="assignTo" readonly placeholder="Auto-assigned"
                                            style="background-color: rgba(255,255,255,0.5);">
                                    </div>
                                    <div class="form-group">
                                        <label for="remarks">Remarks</label>
                                        <textarea id="remarks" rows="3" placeholder="Additional notes..."></textarea>
                                        <div class="quick-notes" style="margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem;">
                                            <button type="button" class="btn btn-sm" onclick="appendQuickNote('remarks', 'Follow Up Call Done')" style="font-size: 0.75rem; padding: 0.4rem 0.75rem; background: var(--border); border-radius: 4px;">Follow Up Call Done</button>
                                            <button type="button" class="btn btn-sm" onclick="appendQuickNote('remarks', 'WhatsApp Details Sent!')" style="font-size: 0.75rem; padding: 0.4rem 0.75rem; background: var(--border); border-radius: 4px;">WhatsApp Details Sent!</button>
                                            <button type="button" class="btn btn-sm" onclick="appendQuickNote('remarks', 'Need to Call Back')" style="font-size: 0.75rem; padding: 0.4rem 0.75rem; background: var(--border); border-radius: 4px;">Need to Call Back</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 2rem; display: flex; gap: 1rem;">
                            <button type="submit" id="submitBtn" class="btn btn-primary" style="flex: 1; padding: 1rem;">Save Inquiry</button>
                            <button type="button" id="clearBtn" class="btn btn-secondary" style="flex: 1; padding: 1rem;">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        import { supabase } from './js/supabaseClient.js';
        import { authService } from './js/services/authService.js';
        import { leadsService } from './js/services/leadsService.js';
        import { settingsService } from './js/services/settingsService.js';
        import { usersService } from './js/services/usersService.js';
        import { activitiesService } from './js/services/activitiesService.js';

        // State
        let currentUser = null;
        let allUsers = [];
        let currentEventAssignments = {};
        let currentFormOptions = { events: [], sources: [], reasons: [], actions: [], statuses: [] };

        // DOM Elements
        const leadForm = document.getElementById('leadForm');
        const editingIdInput = document.getElementById('editingId');
        const eventsContainer = document.getElementById('eventsInterestedContainer');
        const primaryEventSelect = document.getElementById('primaryEvent');
        const reasonsSelect = document.getElementById('reasonsSelection');
        const actionsSelect = document.getElementById('actionsRequired');
        const assignToInput = document.getElementById('assignTo');

        // Helpers
        window.appendQuickNote = (targetId, text) => {
            const el = document.getElementById(targetId);
            if (!el) return;
            const currentVal = el.value.trim();
            el.value = currentVal ? currentVal + "\n" + text : text;
            el.focus();
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'x-circle' : 'info');
            toast.innerHTML = `<i data-lucide="${icon}"></i><span class="toast-message">${message}</span>`;
            container.appendChild(toast);
            if (window.lucide) lucide.createIcons();
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function getMultiSelectValues(container) {
            const checkboxes = container.querySelectorAll('input[type="checkbox"]:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function togglePrimaryEventVisibility() {
            const selected = getMultiSelectValues(eventsContainer);
            const group = document.getElementById('primaryEventGroup');
            if (selected.length > 1) {
                group.style.display = 'flex';
                primaryEventSelect.setAttribute('required', 'required');
                updatePrimaryOptions(selected);
            } else {
                group.style.display = 'none';
                primaryEventSelect.removeAttribute('required');
                primaryEventSelect.value = selected[0] || '';
            }
            // Trigger realtime update check
            updateRealtimeAssignment();
        }

        function updatePrimaryOptions(selected) {
            const currentVal = primaryEventSelect.value;
            primaryEventSelect.innerHTML = '<option value="" disabled>Select Primary Event</option>';
            selected.forEach(ev => {
                const opt = document.createElement('option');
                opt.value = ev;
                opt.textContent = ev;
                primaryEventSelect.appendChild(opt);
            });
            if (selected.includes(currentVal)) primaryEventSelect.value = currentVal;
            else primaryEventSelect.value = selected[0] || '';
            
            // Trigger realtime update check
            updateRealtimeAssignment();
        }

        function updateRealtimeAssignment() {
            if (!assignToInput) return;
            
            const reason = reasonsSelect.value;
            const primaryEvent = primaryEventSelect.value;
            
            let assignedToId = null;
            let assignedToName = "Unassigned";

            // 1. Reason-based overrides
            if (reason === 'Payment/Refund') {
                const refundManager = allUsers.find(u => u.role === 'Refund Manager');
                if (refundManager) {
                    assignedToId = refundManager.id;
                    assignedToName = refundManager.full_name;
                }
            } else if (reason === 'Special Camp') {
                const specialManager = allUsers.find(u => u.role === 'Special Camp Manager');
                if (specialManager) {
                    assignedToId = specialManager.id;
                    assignedToName = specialManager.full_name;
                }
            }

            // 2. Event-based assignment
            if (!assignedToId && primaryEvent) {
                const assignment = currentEventAssignments[primaryEvent];
                if (assignment) {
                    assignedToId = assignment.id;
                    assignedToName = assignment.name;
                }
            }

            // 3. Fallback to Admin (instead of just current user)
            if (!assignedToId) {
                const adminUser = allUsers.find(u => u.role === 'Admin');
                if (adminUser) {
                    assignedToId = adminUser.id;
                    assignedToName = adminUser.full_name;
                } else if (currentUser) {
                    // Last resort fallback
                    assignedToId = currentUser.id;
                    assignedToName = currentUser.full_name || currentUser.email;
                }
            }

            assignToInput.value = assignedToName;
            assignToInput.dataset.userId = assignedToId || '';
        }

        async function loadOptions() {
            const [settingsRes, usersRes, assignmentsRes] = await Promise.all([
                settingsService.getFormOptions(),
                usersService.getUsers(),
                usersService.getEventAssignments()
            ]);

            if (settingsRes.success) {
                currentFormOptions = settingsRes.data;
                renderLeadSourceRadios(settingsRes.data.sources);
                populateSelect('reasonsSelection', settingsRes.data.reasons);
                populateSelect('actionsRequired', settingsRes.data.actions);
                populateSelect('participantStatus', settingsRes.data.statuses);
                renderEventCheckboxes(settingsRes.data.events);
            }

            if (usersRes.success) allUsers = usersRes.data;
            if (assignmentsRes.success) currentEventAssignments = assignmentsRes.data;

            // Set defaults if not editing
            const urlParams = new URLSearchParams(window.location.search);
            if (!urlParams.get('id')) {
                setFormDefaults();
            }
        }

        function setFormDefaults() {
            if (reasonsSelect) reasonsSelect.value = "Camp Inquiry";
            if (actionsSelect) actionsSelect.value = "Follow Up";
            const participantStatusSelect = document.getElementById('participantStatus');
            if (participantStatusSelect) participantStatusSelect.value = "Getting Information";
            
            // Trigger realtime update check
            updateRealtimeAssignment();
        }

        function renderLeadSourceRadios(sources) {
            const container = document.getElementById('leadSourceRadios');
            if (!container) return;
            container.innerHTML = '';
            sources.forEach((source, idx) => {
                const div = document.createElement('div');
                div.className = 'radio-item';
                div.innerHTML = `
                    <input type="radio" id="source-${idx}" name="leadSource" value="${source}" required>
                    <label for="source-${idx}">${source}</label>
                `;
                container.appendChild(div);
            });
        }

        function populateSelect(id, options) {
            const select = document.getElementById(id);
            if (!select) return;
            const currentVal = select.value;
            select.innerHTML = id.includes('Status') || id.includes('Reason') || id.includes('Action') ? select.innerHTML : '<option value="" disabled selected>Select option</option>';
            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt;
                select.appendChild(o);
            });
            if (currentVal) select.value = currentVal;
        }

        function renderEventCheckboxes(events) {
            const list = eventsContainer.querySelector('.checkbox-list');
            list.innerHTML = '';
            
            // Event list is already sorted by the service
            events.forEach((ev, idx) => {
                const div = document.createElement('div');
                div.className = 'checkbox-item';
                div.innerHTML = `
                    <input type="checkbox" id="ev-${idx}" value="${ev}">
                    <label for="ev-${idx}">
                        <i data-lucide="check" class="check-icon"></i>
                        ${ev}
                    </label>
                `;
                list.appendChild(div);
            });
            
            list.querySelectorAll('input').forEach(input => {
                input.addEventListener('change', togglePrimaryEventVisibility);
            });
            if (window.lucide) lucide.createIcons();
        }

        // Init
        async function init() {
            const { data: { user }, error: authError } = await supabase.auth.getUser();
            if (authError || !user) {
                console.log("No user found, redirecting...");
                window.location.href = 'index.html';
                return;
            }
            
            document.body.classList.add('logged-in');
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            currentUser = { ...user, ...profile };
            
            // Apply Permissions (Role switcher, user display, etc.)
            applyPermissions();
            
            await loadOptions();

            // Check for edit ID in URL
            const urlParams = new URLSearchParams(window.location.search);
            const editId = urlParams.get('id');
            if (editId) {
                await loadLeadForEdit(editId);
            }

            if (window.lucide) lucide.createIcons();

            // Add real-time assignment listeners
            if (reasonsSelect) reasonsSelect.addEventListener('change', updateRealtimeAssignment);
            if (primaryEventSelect) primaryEventSelect.addEventListener('change', updateRealtimeAssignment);

            // Initial assignment check
            updateRealtimeAssignment();
        }

        function applyPermissions() {
            if (!currentUser) return;
            // Sidebar and user display
            const navTeam = document.getElementById('nav-team');
            const navRequests = document.getElementById('nav-requests');
            const navSettings = document.getElementById('nav-settings');
            const currentUserDisplayName = document.getElementById('currentUserDisplayName');
            const currentUserAvatar = document.getElementById('currentUserAvatar');

            if (currentUser.role !== 'Admin') {
                if (navTeam) navTeam.style.display = 'none';
                if (navRequests) navRequests.style.display = 'none';
                if (navSettings) navSettings.style.display = 'none';
            }

            if (currentUserDisplayName) currentUserDisplayName.innerText = currentUser.full_name || currentUser.email;
            if (currentUserAvatar) currentUserAvatar.innerText = (currentUser.full_name || currentUser.email).substring(0, 2).toUpperCase();
        }

        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                const sidebarNav = document.querySelector('.sidebar-nav');
                if (sidebarNav) sidebarNav.classList.toggle('active');
            });
        }

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                await authService.signOut();
                window.location.href = 'index.html';
            });
        }

        async function loadLeadForEdit(id) {
            const { data: lead, success } = await leadsService.getLeadById(id);
            if (!success || !lead) return;

            editingIdInput.value = lead.id;
            document.getElementById('formTitle').innerText = "Edit Inquiry";
            document.getElementById('submitBtn').innerText = "Update Inquiry";

            document.getElementById('fullName').value = lead.full_name;
            document.getElementById('phone').value = lead.phone;
            
            // Set Lead Source radio
            const sourceRadios = document.getElementsByName('leadSource');
            sourceRadios.forEach(r => {
                if (r.value === lead.source) r.checked = true;
            });

            document.getElementById('travelDate').value = lead.travel_date;
            document.getElementById('participantStatus').value = lead.status;
            document.getElementById('remarks').value = lead.remarks;
            assignToInput.value = lead.profiles?.full_name || "Unassigned";

            // Multi-select events
            const checkboxes = eventsContainer.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = (lead.events_interested || []).includes(cb.value);
            });
            
            togglePrimaryEventVisibility();
            if (lead.primary_event) primaryEventSelect.value = lead.primary_event;

            reasonsSelect.value = (lead.reasons_to_call && lead.reasons_to_call.length > 0) ? lead.reasons_to_call[0] : "";
            actionsSelect.value = (lead.actions_required && lead.actions_required.length > 0) ? lead.actions_required[0] : "";
        }

        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const editingId = editingIdInput.value;
                const phoneInput = document.getElementById('phone').value;
                
                if (!editingId) {
                    const { data: leadExists, success: checkSuccess } = await leadsService.checkLeadExists(phoneInput);
                    if (checkSuccess && leadExists) {
                        const selectedEvents = getMultiSelectValues(eventsContainer);
                        let primaryVal = primaryEventSelect.value || selectedEvents[0];
                        if (confirm("Lead exists. Send update request to Admin?")) {
                            const res = await leadsService.createLeadRequest({
                                phone: phoneInput,
                                events_interested: selectedEvents,
                                primary_event: primaryVal,
                                requester_id: currentUser.id,
                                status: 'pending'
                            });
                            if (res.success) {
                                showToast("Request sent!", "success");
                                setTimeout(() => window.location.href = 'index.html', 1500);
                            }
                        }
                        return;
                    }
                }

                const selectedEvents = getMultiSelectValues(eventsContainer);
                if (selectedEvents.length === 0) {
                    showToast("Please select at least one event.", "error");
                    return;
                }

                const phoneNumber = document.getElementById('phone').value;
                if (phoneNumber.length !== 10 || !/^\d+$/.test(phoneNumber)) {
                    showToast("Phone number must be exactly 10 digits.", "error");
                    return;
                }

                let primaryVal = primaryEventSelect.value || selectedEvents[0];
                

                const leadData = {
                    full_name: document.getElementById('fullName').value,
                    phone: phoneInput,
                    source: document.querySelector('input[name="leadSource"]:checked')?.value || '',
                    events_interested: selectedEvents,
                    primary_event: primaryVal,
                    travel_date: document.getElementById('travelDate').value,
                    reasons_to_call: [reasonsSelect.value],
                    status: document.getElementById('participantStatus').value,
                    actions_required: [actionsSelect.value],
                    assigned_to: assignToInput.dataset.userId || currentUser.id, 
                    remarks: document.getElementById('remarks').value
                };

                let result;
                if (editingId) {
                    result = await leadsService.updateLead(editingId, leadData);
                } else {
                    result = await leadsService.createLead(leadData);
                    if (result.success) {
                        await activitiesService.addActivity(result.data.id, 'status_change', `Lead created via separate page`);
                    }
                }

                if (result.success) {
                    showToast(`Inquiry ${editingId ? 'updated' : 'saved'}!`, "success");
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    showToast("Error: " + result.error, "error");
                }
            } catch (err) {
                showToast(err.message, "error");
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Clear form?')) {
                leadForm.reset();
                setFormDefaults();
            }
        });

        init();
    </script>
</body>

</html>
